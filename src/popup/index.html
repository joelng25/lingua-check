<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LinguaCheck</title>
    <style>
      :root,
      [data-theme="light"] {
        --bg: #ffffff;
        --text: #111827;
        --muted: #6b7280;
        --border: #d1d5db;
        --panel: #f3f4f6;
        --primary: #2563eb;
        --success: #059669;
      }

      [data-theme="dark"] {
        --bg: #0f172a;
        --text: #e5e7eb;
        --muted: #94a3b8;
        --border: #334155;
        --panel: #1e293b;
        --primary: #3b82f6;
        --success: #34d399;
      }

      body {
        width: 280px;
        margin: 0;
        padding: 16px;
        font-family: system-ui, -apple-system, Segoe UI, sans-serif;
        color: var(--text);
        background: var(--bg);
      }

      h1 {
        margin: 0 0 4px;
        font-size: 18px;
      }

      p {
        margin: 0 0 16px;
        color: var(--muted);
        font-size: 13px;
      }

      label {
        display: block;
        margin-bottom: 12px;
        font-size: 13px;
      }

      select,
      button,
      a {
        width: 100%;
        box-sizing: border-box;
      }

      select {
        margin-top: 6px;
        padding: 8px;
        border: 1px solid var(--border);
        border-radius: 6px;
        background: var(--bg);
        color: var(--text);
      }

      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 12px;
      }

      #stats-line {
        margin: 0 0 14px;
        font-size: 12px;
        color: var(--muted);
      }

      button,
      a {
        display: inline-block;
        text-align: center;
        text-decoration: none;
        border: 0;
        border-radius: 6px;
        padding: 10px 12px;
        font-size: 13px;
        cursor: pointer;
      }

      #panel {
        margin-bottom: 10px;
        background: var(--success);
        color: white;
      }

      #toggle {
        background: var(--primary);
        color: white;
      }

      #toggle.off {
        background: #6b7280;
      }

      #site {
        margin-bottom: 10px;
        background: var(--panel);
        color: var(--text);
        border: 1px solid var(--border);
      }

      a {
        background: var(--panel);
        color: var(--text);
        border: 1px solid var(--border);
      }

      .shortcut {
        margin: 0 0 12px;
        font-size: 12px;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <h1>LinguaCheck</h1>
    <p>Corrector de ortografía y gramática</p>

    <div class="row">
      <span>Estado</span>
      <strong id="status">Activo</strong>
    </div>

    <p id="stats-line">0 correcciones esta semana</p>

    <label>
      Idioma
      <select id="language">
        <option value="es">Español</option>
        <option value="en-US">English (US)</option>
        <option value="en-GB">English (UK)</option>
        <option value="fr">Français</option>
        <option value="de">Deutsch</option>
        <option value="pt-BR">Português (BR)</option>
      </select>
    </label>

    <p class="shortcut">Atajos: Ctrl+. · ←→ sugerencias · Enter · Esc</p>

    <button id="panel" type="button">Ver panel de errores</button>
    <button id="toggle" type="button">Desactivar</button>
    <button id="site" type="button">Desactivar en este sitio</button>
    <a id="options" href="#">Abrir opciones</a>

    <script type="module" src="./popup.ts"></script>
  </body>
</html>
