<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LinguaCheck — Opciones</title>
    <style>
      body {
        max-width: 720px;
        margin: 0 auto;
        padding: 32px 20px;
        font-family: system-ui, -apple-system, Segoe UI, sans-serif;
        color: #111827;
      }

      h1 {
        margin-top: 0;
      }

      label {
        display: block;
        margin-bottom: 18px;
        font-size: 14px;
      }

      input,
      textarea,
      select,
      button {
        font: inherit;
      }

      input[type="number"],
      input[type="url"],
      select {
        margin-top: 6px;
        padding: 8px;
        border: 1px solid #d1d5db;
        border-radius: 6px;
        width: 100%;
        box-sizing: border-box;
      }

      textarea {
        width: 100%;
        min-height: 140px;
        margin-top: 6px;
        padding: 10px;
        border: 1px solid #d1d5db;
        border-radius: 6px;
        box-sizing: border-box;
        resize: vertical;
      }

      button {
        border: 0;
        border-radius: 6px;
        padding: 10px 14px;
        background: #2563eb;
        color: white;
        cursor: pointer;
      }

      #saved {
        margin-left: 12px;
        color: #059669;
        opacity: 0;
        transition: opacity 0.2s ease;
      }

      #saved.visible {
        opacity: 1;
      }

      h2 {
        font-size: 16px;
        margin-bottom: 8px;
      }

      .hint {
        color: #6b7280;
        font-size: 13px;
      }

      kbd {
        background: #f3f4f6;
        border: 1px solid #d1d5db;
        border-radius: 4px;
        padding: 2px 6px;
        font-size: 12px;
      }

      #ignored-rules {
        list-style: none;
        padding: 0;
        margin: 0 0 20px;
      }

      #ignored-rules li {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 8px 0;
        border-bottom: 1px solid #e5e7eb;
        font-size: 13px;
      }

      #ignored-rules button {
        background: #ef4444;
        padding: 6px 10px;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <h1>Opciones de LinguaCheck</h1>

    <label>
      Idioma por defecto
      <select id="language">
        <option value="es">Español</option>
        <option value="en-US">English (US)</option>
        <option value="en-GB">English (UK)</option>
        <option value="fr">Français</option>
        <option value="de">Deutsch</option>
        <option value="pt-BR">Português (BR)</option>
      </select>
    </label>

    <label>
      Retardo antes de revisar (ms)
      <input id="debounce" type="number" min="200" max="3000" step="100" />
    </label>

    <label>
      Servidor LanguageTool (opcional)
      <input
        id="api-url"
        type="url"
        placeholder="https://api.languagetool.org/v2/check"
      />
      <span class="hint">Deja vacío para usar la API pública. Ej: http://localhost:8081/v2/check</span>
    </label>

    <label>
      Diccionario personal
      <textarea
        id="dictionary"
        placeholder="Una palabra por línea. Estas palabras no se marcarán como error."
      ></textarea>
    </label>

    <section>
      <h2>Reglas ignoradas</h2>
      <p class="hint">Las reglas que ignores desde el tooltip aparecerán aquí.</p>
      <ul id="ignored-rules"></ul>
    </section>

    <p class="hint">Atajo: <kbd>Ctrl</kbd> + <kbd>.</kbd> para aplicar la primera sugerencia.</p>

    <button id="save" type="button">Guardar</button>
    <span id="saved">Guardado</span>

    <script type="module" src="./options.ts"></script>
  </body>
</html>
